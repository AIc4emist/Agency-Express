<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agency Document</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f3f4f6;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 6px;
      box-sizing: border-box;
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      border-radius: 6px;
    }

    @media (max-width: 800px) {
      .wrap {
        padding: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      class="viewer"
      src="Agency Express Shopper Guide.pdf#view=FitH&zoom=page-width">
    </iframe>
  </div>
</body>
</html>
